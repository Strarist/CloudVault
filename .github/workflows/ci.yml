name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/cloudvault_ci
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      STORAGE_USE_MOCK: "true"
      AI_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install backend deps
        run: npm ci
      - name: Typecheck / build
        run: npm run build
      - name: Unit tests (no external services)
        run: node --test frontend/src/lib/sessionGuards.test.js frontend/src/lib/validation.test.js

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
